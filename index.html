<!DOCTYPE html>

<head>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap');
        
        body {
            background-color: #ffffff;
            color: #1a1a1a;
            font-family: 'Noto Sans JP', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        body.dark-mode {
            background-color: #010101;
            color: #ffffff;
        }

        .word-display {
            font-size: clamp(2.5rem, 9.5vw, 7.5rem);
            font-weight: 900;
            line-height: 1.1;
            text-align: center;
            word-break: break-all;
            min-height: 12rem;
            display: flex;
            justify-content: center;
            align-items: center;
            letter-spacing: -0.02em;
            padding: 0 1.5rem;
            color: #000000;
        }
        body.dark-mode .word-display { color: #ffffff; }

        .char-next { color: #cbd5e1; }
        body.dark-mode .char-next { color: #444444; }

        .char-correct { color: #2563eb; }
        body.dark-mode .char-correct { color: #00ffcc; text-shadow: 0 0 15px rgba(0, 255, 204, 0.7); }

        .char-error { color: #ff0055; text-decoration: underline; background-color: rgba(255, 0, 85, 0.1); }
        
        .pop-effect {
            animation: pop 0.2s ease-out;
        }
        @keyframes pop {
            0% { transform: scale(0.99); opacity: 0.9; }
            100% { transform: scale(1); opacity: 1; }
        }

        .stats {
            position: absolute;
            bottom: 2rem;
            font-size: 1.2rem;
            font-weight: 700;
            color: #94a3b8;
            letter-spacing: 0.2em;
            width: 100%;
            text-align: center;
            font-family: monospace;
        }
        body.dark-mode .stats { color: #555; }

        #hidden-input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .cursor {
            border-bottom: 6px solid #3b82f6;
            animation: blink 0.4s infinite;
        }
        body.dark-mode .cursor { border-color: #00ffcc; }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        .start-btn {
            background: #1e293b;
            color: #ffffff;
            padding: 0.8rem 3rem;
            font-size: 1.5rem;
            font-weight: 800;
            transition: all 0.1s ease;
            cursor: pointer;
            border: none;
            border-radius: 4px;
        }
        .start-btn:hover {
            background: #3b82f6;
            transform: scale(1.03);
        }
        body.dark-mode .start-btn {
            background: #ffffff;
            color: #000;
        }
        body.dark-mode .start-btn:hover { background: #00ffcc; }

        .mode-link {
            position: absolute;
            top: 2rem;
            right: 2rem;
            color: #94a3b8;
            font-weight: bold;
            text-decoration: none;
            border: 1px solid #e2e8f0;
            padding: 0.5rem 1rem;
            transition: all 0.3s;
        }
        .mode-link:hover {
            color: #2563eb;
            border-color: #2563eb;
        }
        body.dark-mode .mode-link {
            border-color: #333;
            color: #555;
        }
        body.dark-mode .mode-link:hover {
            color: #00ffcc;
            border-color: #00ffcc;
        }

        .theme-toggle {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            padding: 0.5rem 1rem;
            border: 1px solid #e2e8f0;
            background: transparent;
            transition: all 0.3s;
        }
        .theme-toggle:hover { color: #1a1a1a; border-color: #1a1a1a; }
        body.dark-mode .theme-toggle { border-color: #333; color: #555; }
        body.dark-mode .theme-toggle:hover { color: #ffffff; border-color: #ffffff; }

        .timer-warning {
            color: #ff0055 !important;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.5);
        }
    </style>

        let missCount = 0;

        let timerId = null;
        let currentRomanText = "";

        const elements = {
            get startScreen() { return document.getElementById('start-screen'); },
            get gameScreen() { return document.getElementById('game-screen'); },
            get wordContainer() { return document.getElementById('word-container'); },
            get romanDisplay() { return document.getElementById('roman-display'); },
            get hiddenInput() { return document.getElementById('hidden-input'); },
            get statsArea() { return document.getElementById('stats-area'); }
        };

        const FLEX_GROUPS = [
            ['si', 'shi'], ['ti', 'chi'], ['tu', 'tsu'], ['zi', 'ji'], ['fu', 'hu'], ['n', 'nn'],
            ['sya', 'sha'], ['syu', 'shu'], ['syo', 'sho'],
            ['tya', 'cha'], ['tyu', 'chu'], ['tyo', 'cho'],
            ['ja', 'zya', 'jya'], ['ju', 'zyu', 'jyu'], ['jo', 'zyo', 'jyo']
        ];

        function getCharFromCode(code) {
            if (code.startsWith('Key')) return code.slice(3).toLowerCase();
            if (code.startsWith('Digit')) return code.slice(5);
            if (code.startsWith('Numpad') && code.length === 7) return code.slice(6);
            if (code === 'Minus' || code === 'NumpadSubtract') return '-';
            if (code === 'Period' || code === 'NumpadDecimal') return '.';
            if (code === 'Comma') return ',';
            if (code === 'Space') return ' ';
            if (code === 'Slash' || code === 'NumpadDivide') return '/';
            return null;
        }

        // 入力を処理する肝心の関数 (ここが index.html に抜けていた！)
        function handleInput(inputChar) {
            const targetChar = currentRomanText[currentCharIndex];
            if (inputChar === targetChar) {
                processCorrect();
            } else if (tryFlexibleMatch(inputChar)) {
                processCorrect();
            } else {
                processMiss();
            }
            updateStats();
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (elements.startScreen && !elements.startScreen.classList.contains('hidden')) {
                    startGame();
                } else if (elements.gameScreen && elements.gameScreen.innerHTML.includes('TIME UP')) {
                    location.reload();
                }
                return;
            }

            if (!elements.gameScreen.classList.contains('hidden') && timeLeft > 0) {
                const char = getCharFromCode(e.code);
                if (char) {
                    e.preventDefault();
                    handleInput(char);
                }
            }
        });

        function startGame() {
            elements.startScreen.classList.add('hidden');
            elements.gameScreen.classList.remove('hidden');
            shuffleWords();
            currentWordIndex = 0;
            score = 0;
            missCount = 0;
            timeLeft = 120;
            nextWord();
            elements.hiddenInput.focus();
            if (timerId) clearInterval(timerId);
            timerId = setInterval(() => {
                timeLeft--;
                updateStats();
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    endGame();
                }
            }, 1000);
            updateStats();
        }

        function shuffleWords() {
            for (let i = wordList.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [wordList[i], wordList[j]] = [wordList[j], wordList[i]];
            }
        }

        function nextWord() {
            if (currentWordIndex >= wordList.length) {
                shuffleWords();
                currentWordIndex = 0;
            }
            currentCharIndex = 0;
            currentRomanText = wordList[currentWordIndex].roman;
            displayWord();
        }

        function displayWord() {
            const container = document.getElementById('word-container');
            if (container) {
                container.textContent = wordList[currentWordIndex].kanji;
                container.classList.add('pop-effect');
                setTimeout(() => container.classList.remove('pop-effect'), 200);
            }
            renderRoman();
        }

        function renderRoman() {
            const display = document.getElementById('roman-display');
            if (!display) return;
            let html = '';
            for (let i = 0; i < currentRomanText.length; i++) {
                if (i < currentCharIndex) {
                    html += `<span class="char-correct">${currentRomanText[i]}</span>`;
                } else if (i === currentCharIndex) {
                    html += `<span class="cursor">${currentRomanText[i]}</span>`;
                } else {
                    html += `<span class="char-next">${currentRomanText[i]}</span>`;
                }
            }
            display.innerHTML = html;
        }

        function processCorrect() {
            currentCharIndex++;
            score++;
            if (currentCharIndex >= currentRomanText.length) {
                currentWordIndex++;
                setTimeout(nextWord, 35);
            } else {
                renderRoman();
            }
        }

        function processMiss() {
            missCount++;
            const display = document.getElementById('roman-display');
            if (display && display.children[currentCharIndex]) {
                const currentSpan = display.children[currentCharIndex];
                currentSpan.classList.add('char-error');
                setTimeout(() => currentSpan.classList.remove('char-error'), 100);
            }
        }

        function tryFlexibleMatch(inputChar) {
            for (const offset of [0, 1]) {
                const startIdx = currentCharIndex - offset;
                if (startIdx < 0) continue;
                const part = currentRomanText.slice(startIdx);
                for (const group of FLEX_GROUPS) {
                    for (const member of group) {
                        if (part.startsWith(member)) {
                            for (const alt of group) {
                                if (alt !== member && inputChar === alt[offset]) {
                                    currentRomanText = currentRomanText.slice(0, startIdx) + alt + currentRomanText.slice(startIdx + member.length);
                                    return true;
                                }
                            }
                        }
                    }
                }
            }
            return false;
        }

        function updateStats() {
            const area = elements.statsArea;
            const min = Math.floor(timeLeft / 60);
            const sec = timeLeft % 60;
            const timeStr = `${min}:${sec.toString().padStart(2, '0')}`;
            const timeSpent = 120 - timeLeft;
            const kpm = Math.floor(score / ((timeSpent || 1) / 60)) || 0;
            area.innerHTML = `TIME: ${timeStr} | COMPLETE: ${currentWordIndex} | SPEED: ${kpm} KPM | MISS: ${missCount}`;
        }

        function endGame() {
            const timeSpent = 120 - timeLeft;
            const kpm = Math.floor(score / ((timeSpent || 1) / 60)) || 0;
            const accuracy = score + missCount > 0 ? Math.floor((score / (score + missCount)) * 100) : 0;
            elements.gameScreen.innerHTML = `
                <div class="text-center">
                    <h2 class="text-7xl font-black mb-12 text-pink-600">TIME UP</h2>
                    <div class="space-y-4 text-xl font-bold text-gray-700 mb-16 text-left inline-block">
                        <p>KPM: <span class="text-slate-900">${kpm}</span></p>
                        <p>ACCURACY: <span class="text-slate-900">${accuracy}%</span></p>
                    </div><br>
                    <button onclick="location.reload()" class="start-btn">お疲れさん (Enter)</button>
                </div>
            `;
        }
    </script>
</body>
</html>
