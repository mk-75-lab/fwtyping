<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>独白するユニバーサル横タイピング</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap');
        
        body {
            background-color: #010101;
            color: #ffffff;
            font-family: 'Noto Sans JP', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .word-display {
            font-size: clamp(2.5rem, 9.5vw, 7.5rem);
            font-weight: 900;
            line-height: 1.1;
            text-align: center;
            word-break: break-all;
            min-height: 12rem;
            display: flex;
            justify-content: center;
            align-items: center;
            letter-spacing: -0.02em;
            padding: 0 1.5rem;
        }

        .char-next { color: #444444; }
        .char-correct { color: #00ffcc; text-shadow: 0 0 15px rgba(0, 255, 204, 0.7); }
        .char-error { color: #ff0055; text-decoration: underline; background-color: rgba(255, 0, 85, 0.25); }
        
        .pop-effect {
            animation: pop 0.2s ease-out;
        }
        @keyframes pop {
            0% { transform: scale(0.99); opacity: 0.9; }
            100% { transform: scale(1); opacity: 1; }
        }

        .stats {
            position: absolute;
            bottom: 2rem;
            font-size: 1.2rem;
            font-weight: 700;
            color: #555;
            letter-spacing: 0.2em;
            width: 100%;
            text-align: center;
            font-family: monospace;
        }

        #hidden-input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .cursor {
            border-bottom: 6px solid #00ffcc;
            animation: blink 0.4s infinite;
        }
        @keyframes blink {
            50% { border-color: transparent; }
        }

        .start-btn {
            background: #ffffff;
            color: #000;
            padding: 0.8rem 3rem;
            font-size: 1.5rem;
            font-weight: 800;
            transition: all 0.1s ease;
            cursor: pointer;
            border: none;
            border-radius: 2px;
        }
        .start-btn:hover {
            background: #00ffcc;
            transform: scale(1.03);
        }

        .timer-warning {
            color: #ff0055 !important;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.5);
        }
    </style>
</head>
<body>

    <div id="start-screen" class="flex flex-col items-center">
        <h1 class="text-4xl md:text-7xl font-black mb-4 tracking-tighter italic text-center">独白するマサキ式<br>ユニバーサル横タイピング</h1>
        <p class="text-xl md:text-2xl mb-14 text-gray-800 font-bold tracking-widest uppercase text-center">Repetition Optimized and<br>Improved Visibility</p>
        <button onclick="startGame()" class="start-btn">
            タイピング開始 (Enter)
        </button>
        <p class="mt-10 text-gray-900 text-xs font-mono tracking-tighter">TIME LIMIT: 120s / OPTIMIZED FOR 1920x1080</p>
    </div>

    <div id="game-screen" class="hidden w-full flex flex-col items-center">
        <div id="word-container" class="word-display"></div>
        <div id="roman-display" class="text-2xl md:text-5xl text-center mt-4 text-gray-800 font-mono tracking-widest font-black uppercase"></div>
    </div>

    <div class="stats" id="stats-area"></div>
    
    <input type="text" id="hidden-input" autocomplete="off" spellcheck="false" inputmode="email">

    <script>
        const CATEGORIES = {
            AI_AND_TECH: [
                { kanji: "チャットＧＰＴ", roman: "tyattogpt" },
                { kanji: "エヌビディア", roman: "enubidia" },
                { kanji: "ハルシネーション", roman: "harushine-shon" },
                { kanji: "グーグル", roman: "gu-guru" },
                { kanji: "インテル", roman: "interu" },
                { kanji: "ライゼン", roman: "raizen" },
                { kanji: "ジェミニ", roman: "jemini" },
                { kanji: "クロード", roman: "kuro-do" },
                { kanji: "グロック", roman: "gurokku" },
                { kanji: "大規模言語モデル", roman: "daikibogengomoderu" },
                { kanji: "ディープラーニング", roman: "di-pura-ningu" },
                { kanji: "量子コンピューター", roman: "ryousikonpyu-ta-" }
            ],
            QUOTES_AND_LAWS: [
                { kanji: "訳が分からないよ", roman: "wakegawakannaiyo" },
                { kanji: "マーフィーの法則", roman: "ma-fi-nohousoku" },
                { kanji: "ヒヤリハット", roman: "hiyarihatto" },
                { kanji: "ハインリッヒの法則", roman: "hainrihhinohousoku" },
                { kanji: "微分積分嫌な気分", roman: "bibunsekibuniyanakibun" }
            ],
            ADMIN_AND_GOVERNMENT: [
                { kanji: "厚生労働省", roman: "kouseiroudoushou" },
                { kanji: "税務署", roman: "zeimushou" },
                { kanji: "確定申告", roman: "kakuteishinkoku" },
                { kanji: "源泉徴収", roman: "gensenchoushuu" },
                { kanji: "住民税", roman: "juuminzei" },
                { kanji: "厚生年金", roman: "kouseinenkin" },
                { kanji: "インボイス制度", roman: "inboisuiseido" }
            ],
            TAKOPI: [
                { kanji: "タコピーの原罪", roman: "takopiinogenzai" },
                { kanji: "だからタッセルってなんだよ！？", roman: "dakaratasserutennandayo" },
                { kanji: "わ、わかんないっピ", roman: "wawakannaipi" },
                { kanji: "ハッピーを広めるっピ", roman: "happi-wohiromerupi" },
                { kanji: "もう嫌なんだっピ", roman: "mouiyanandapi" },
                { kanji: "しずかちゃん", roman: "shizukachan" },
                { kanji: "まりなちゃん", roman: "marinachan" },
                { kanji: "チャッピー", roman: "chappi-" },
                { kanji: "仲直りのリボン", roman: "nakanaorinonribon" },
                { kanji: "ハッピーカメラ", roman: "happi-kamera" },
                { kanji: "タコピー、お話きいて", roman: "takopi-ohanashikiite" }
            ],
            FACILITY: [
                { kanji: "フリーワークス湘南平塚", roman: "furi-wa-kusushounanhiratsuka" },
                { kanji: "フリーワークス鎌ケ谷", roman: "furi-wa-kusukamagaya" },
                { kanji: "就労移行支援", roman: "shuurouikoushien" },
                { kanji: "個別支援計画", roman: "kobetushienkeikaku" },
                { kanji: "モニタリング", roman: "monitaringu" },
                { kanji: "自立訓練", roman: "jiritsukunren" },
                { kanji: "就労定着支援", roman: "shuurouteichakushien" },
                { kanji: "退職代行", roman: "taishokudaikou" },
                { kanji: "履歴書", roman: "rirekisho" },
                { kanji: "職務経歴書", roman: "shokumukeirekisho" },
                { kanji: "お祈りメール", roman: "oinorime-ru" },
                { kanji: "コンプライアンス", roman: "konnpuraiannsu" }
            ],
            ANIME_GAME_VTUBER: [
                { kanji: "葬送のフリーレン", roman: "sousounofuri-ren" },
                { kanji: "フリーレン", roman: "furi-ren" },
                { kanji: "勇者ヒンメルならそうした", roman: "yuusyahimmnerunarasoushita" },
                { kanji: "ゾルトラーク", roman: "zorutora-ku" },
                { kanji: "魔族を殺す魔法", roman: "mazokuokorusumahou" },
                { kanji: "アウラ自害しろ", roman: "aurajigaishiro" },
                { kanji: "フェルン", roman: "ferun" },
                { kanji: "シュタルク", roman: "shutaruku" },
                { kanji: "推しの子", roman: "oshinoko" },
                { kanji: "星野アイ", roman: "hoshinoai" },
                { kanji: "Ｂ小町", roman: "bi-komachi" },
                { kanji: "暗殺教室", roman: "ansatsukyoushitsu" },
                { kanji: "殺せんせー", roman: "korosense-" },
                { kanji: "マッハ２０", roman: "mahhanijuu" },
                { kanji: "鬼滅の刃", roman: "kimetunoyaiba" },
                { kanji: "判断が遅い", roman: "hanndanngaosoi" },
                { kanji: "ホロライブ", roman: "hororaibu" },
                { kanji: "にじさんじ", roman: "nijisanji" },
                { kanji: "ぶいすぽっ！", roman: "buisupo" },
                { kanji: "赤スパ", roman: "akasupa" },
                { kanji: "昇龍拳", roman: "shouryuken" },
                { kanji: "エーペックス", roman: "e-pekkusu" },
                { kanji: "ヴァロラント", roman: "varoranto" }
            ],
            BUSINESS_ACCOUNTING: [
                { kanji: "損益分岐点", roman: "sonnekibunkiten" },
                { kanji: "経営理念", roman: "keieirinen" },
                { kanji: "限界利益", roman: "genkairieki" },
                { kanji: "減価償却費", roman: "genkashoukyakuhi" },
                { kanji: "貸借対照表", roman: "taishakutaishouhyou" },
                { kanji: "キャッシュフロー", roman: "kyasshufuro-" },
                { kanji: "ＰＤＣＡサイクル", roman: "pdcasaikuru" },
                { kanji: "売掛金", roman: "urikakekin" },
                { kanji: "買掛金", roman: "kaikakekin" }
            ],
            SLANG_DESPAIR: [
                { kanji: "垢バン", roman: "akaban" },
                { kanji: "凍結", roman: "touketu" },
                { kanji: "草ｗｗ", roman: "kusaww" },
                { kanji: "それな", roman: "sorena" },
                { kanji: "詰んだ", roman: "tsunda" },
                { kanji: "自宅警備員", roman: "jitakukeibiin" },
                { kanji: "オワコン", roman: "owakon" },
                { kanji: "進捗どうですか", roman: "shinchokudoudesuka" },
                { kanji: "ストロングゼロ", roman: "sutoronguzero" },
                { kanji: "社畜", roman: "shachiku" },
                { kanji: "増税メガネ", roman: "zouzeimegane" },
                { kanji: "自己肯定感", roman: "jikokouteikan" }
            ],
            REQUEST_LIST: [
                { kanji: "努力は裏切らない（白目）", roman: "doryokuhauragiranai" },
                { kanji: "筋肉は裏切らない", roman: "kinnnikuhauragiranai" },
                { kanji: "明日から本気出す", roman: "ashitakarahonkidasu" },
                { kanji: "実務未経験歓迎（大嘘）", roman: "jitsumumikeikenkangei" },
                { kanji: "目標未達", roman: "mokuhyoumitatu" },
                { kanji: "アットホームな職場です（絶望）", roman: "attoho-munashokubadesu" },
                { kanji: "定時退社は都市伝説", roman: "teijitaishahatoshidensetsu" },
                { kanji: "進捗どうですか？（殺意）", roman: "shinchokudoudesuka" }
            ],
            KUSO_W: [
                { kanji: "インターネット最高", roman: "inta-nettosaikou" },
                { kanji: "インターネットやめろ", roman: "inta-nettoyamero" },
                { kanji: "ちいかわ", roman: "tiikawa" },
                { kanji: "なんとかなれー！", roman: "nantokanare-" },
                { kanji: "ってこと！？", roman: "ttekoto" },
                { kanji: "草超えて森", roman: "kusakoetemori" },
                { kanji: "それなすぎて草", roman: "sorenasugitekusa" },
                { kanji: "一生寝てたい", roman: "isshounetetai" },
                { kanji: "金がねぇ", roman: "kaneganee" },
                { kanji: "圧倒的成長（嘘）", roman: "attoutekiseichou" },
                { kanji: "人生詰んだｗｗ", roman: "jinseitsundaww" },
                { kanji: "語彙力消失", roman: "goiryokusyoushitsu" },
                { kanji: "知らんがな", roman: "shirangana" },
                { kanji: "猫になりたい", roman: "nekoninaritai" }
            ]
        };

        const wordList = Object.values(CATEGORIES).flat();

        let currentWordIndex = 0;
        let currentCharIndex = 0;
        let score = 0;
        let missCount = 0;
        let startTime;
        let timeLeft = 120;
        let timerId = null;
        let currentRomanText = "";

        const elements = {
            get startScreen() { return document.getElementById('start-screen'); },
            get gameScreen() { return document.getElementById('game-screen'); },
            get wordContainer() { return document.getElementById('word-container'); },
            get romanDisplay() { return document.getElementById('roman-display'); },
            get hiddenInput() { return document.getElementById('hidden-input'); },
            get statsArea() { return document.getElementById('stats-area'); }
        };

        const FLEX_GROUPS = [
            ['si', 'shi'], ['ti', 'chi'], ['tu', 'tsu'], ['zi', 'ji'], ['fu', 'hu'], ['n', 'nn'],
            ['sya', 'sha'], ['syu', 'shu'], ['syo', 'sho'],
            ['tya', 'cha'], ['tyu', 'chu'], ['tyo', 'cho'],
            ['ja', 'zya', 'jya'], ['ju', 'zyu', 'jyu'], ['jo', 'zyo', 'jyo']
        ];

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (elements.startScreen && !elements.startScreen.classList.contains('hidden')) {
                    startGame();
                } else if (elements.gameScreen && elements.gameScreen.innerHTML.includes('TIME UP')) {
                    location.reload();
                }
            }
        });

        function startGame() {
            if (!elements.startScreen || !elements.gameScreen) return;
            elements.startScreen.classList.add('hidden');
            elements.gameScreen.classList.remove('hidden');
            
            shuffleWords();
            currentWordIndex = 0;
            score = 0;
            missCount = 0;
            timeLeft = 120;
            startTime = Date.now();
            
            nextWord();
            
            elements.hiddenInput.focus();
            document.addEventListener('click', () => {
                if (elements.gameScreen && !elements.gameScreen.classList.contains('hidden')) {
                    elements.hiddenInput.focus();
                }
            });

            if (timerId) clearInterval(timerId);
            timerId = setInterval(() => {
                timeLeft--;
                updateStats();
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    endGame();
                }
            }, 1000);
            updateStats();
        }

        function shuffleWords() {
            for (let i = wordList.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [wordList[i], wordList[j]] = [wordList[j], wordList[i]];
            }
        }

        function nextWord() {
            if (currentWordIndex >= wordList.length) {
                clearInterval(timerId);
                endGame();
                return;
            }
            currentCharIndex = 0;
            currentRomanText = wordList[currentWordIndex].roman;
            displayWord();
        }

        function displayWord() {
            const container = document.getElementById('word-container');
            if (container) {
                container.textContent = wordList[currentWordIndex].kanji;
                container.classList.add('pop-effect');
                setTimeout(() => container.classList.remove('pop-effect'), 200);
            }
            renderRoman();
        }

        function renderRoman() {
            const display = document.getElementById('roman-display');
            if (!display) return;
            let html = '';
            for (let i = 0; i < currentRomanText.length; i++) {
                if (i < currentCharIndex) {
                    html += `<span class="char-correct">${currentRomanText[i]}</span>`;
                } else if (i === currentCharIndex) {
                    html += `<span class="cursor">${currentRomanText[i]}</span>`;
                } else {
                    html += `<span class="char-next">${currentRomanText[i]}</span>`;
                }
            }
            display.innerHTML = html;
        }

        window.onload = () => {
            const input = elements.hiddenInput;
            if (!input) return;

            input.addEventListener('compositionstart', () => {
                input.value = '';
            });

            input.addEventListener('input', (e) => {
                if (timeLeft <= 0) return;
                
                if (e.inputType === 'insertCompositionText') {
                    input.value = '';
                    return;
                }

                const inputVal = e.target.value.toLowerCase();
                const inputChar = inputVal.slice(-1);
                if (inputChar === "") return;

                const targetChar = currentRomanText[currentCharIndex];
                
                if (inputChar === targetChar) {
                    processCorrect();
                } else if (tryFlexibleMatch(inputChar)) {
                    processCorrect();
                } else {
                    processMiss();
                }

                e.target.value = '';
                updateStats();
            });
        };

        function processCorrect() {
            currentCharIndex++;
            score++;
            if (currentCharIndex >= currentRomanText.length) {
                currentWordIndex++;
                setTimeout(nextWord, 35);
            } else {
                renderRoman();
            }
        }

        function processMiss() {
            missCount++;
            const display = document.getElementById('roman-display');
            if (display && display.children[currentCharIndex]) {
                const currentSpan = display.children[currentCharIndex];
                currentSpan.classList.add('char-error');
                setTimeout(() => currentSpan.classList.remove('char-error'), 100);
            }
        }

        function tryFlexibleMatch(inputChar) {
            for (const offset of [0, 1]) {
                const startIdx = currentCharIndex - offset;
                if (startIdx < 0) continue;
                
                const part = currentRomanText.slice(startIdx);
                for (const group of FLEX_GROUPS) {
                    for (const member of group) {
                        if (part.startsWith(member)) {
                            for (const alt of group) {
                                if (alt !== member && inputChar === alt[offset]) {
                                    const newRoman = currentRomanText.slice(0, startIdx) + alt + currentRomanText.slice(startIdx + member.length);
                                    currentRomanText = newRoman;
                                    return true;
                                }
                            }
                        }
                    }
                }
            }
            return false;
        }

        function updateStats() {
            const area = elements.statsArea;
            if (!area) return;
            const min = Math.floor(timeLeft / 60);
            const sec = timeLeft % 60;
            const timeStr = `${min}:${sec.toString().padStart(2, '0')}`;
            const timeSpent = 120 - timeLeft;
            const kpm = Math.floor(score / ((timeSpent || 1) / 60)) || 0;
            
            const timerClass = timeLeft <= 10 ? 'timer-warning' : '';
            area.innerHTML = `
                <span class="${timerClass}">TIME: ${timeStr}</span> | 
                COMPLETE: ${currentWordIndex} | 
                SPEED: ${kpm} KPM | 
                MISS: ${missCount}
            `;
        }

        function endGame() {
            const timeSpent = 120 - timeLeft;
            const kpm = Math.floor(score / ((timeSpent || 1) / 60)) || 0;
            const accuracy = score + missCount > 0 ? Math.floor((score / (score + missCount)) * 100) : 0;

            if (elements.gameScreen) {
                elements.gameScreen.innerHTML = `
                    <div class="text-center flex flex-col items-center">
                        <h2 class="text-7xl font-black mb-12 text-pink-600">TIME UP</h2>
                        <div class="space-y-4 text-xl font-bold text-gray-700 mb-16 text-left">
                            <p>KPM (速度): <span class="text-white">${kpm}</span></p>
                            <p>ACCURACY (精度): <span class="text-white">${accuracy}%</span></p>
                            <p>COMPLETE (単語数): <span class="text-white">${currentWordIndex}</span></p>
                            <p>MISS (ミス): <span class="text-white">${missCount}</span></p>
                        </div>
                        <button onclick="location.reload()" class="start-btn">
                            お疲れさん (Enter)
                        </button>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
